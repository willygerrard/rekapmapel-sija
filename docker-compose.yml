services:
  php:
    build: .
    container_name: rekapmapel_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    ports:
      - "127.0.0.1:9001:9000"
    networks:
      - rekapmapel_net

  db:
    image: mariadb:11
    container_name: rekapmapel_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - rekapmapel_data:/var/lib/mysql
    networks:
      - rekapmapel_net

networks:
  rekapmapel_net:
    driver: bridge

volumes:
  rekapmapel_data: